<script>
function getGreetingWord() {
  const h = new Date().getHours();
  if (h >= 5 && h < 12) return 'Buenos días';
  if (h >= 12 && h < 19) return 'Buenas tardes';
  return 'Buenas noches';
}
function getUserName() { return localStorage.getItem('user_name_2026') || ''; }
function initWelcome() {
  const name = localStorage.getItem('user_name_2026');
  if (!name) {
    document.getElementById('welcome-overlay').style.display = 'flex';
    const input = document.getElementById('welcome-input');
    const btn = document.getElementById('welcome-btn');
    const save = () => {
      const val = input.value.trim();
      if (!val) { input.focus(); return; }
      localStorage.setItem('user_name_2026', val);
      document.getElementById('welcome-overlay').style.display = 'none';
      refreshAllGreetings();
    };
    btn.addEventListener('click', save);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') save(); });
  }
}
function refreshAllGreetings() {
  document.querySelectorAll('.greeting-name-slot').forEach(el => {
    const name = getUserName();
    el.textContent = name ? `${getGreetingWord()}, ${name}` : getGreetingWord();
  });
}

const fmt = n => '$' + Math.round(n).toLocaleString('es-CL');
function parseCurrency(str) {
  const digits = String(str).replace(/[^0-9]/g, '');
  return digits ? parseInt(digits, 10) : 0;
}
function getStorageKey(key) { return 'meta_ventas_2026_' + key; }
function loadData(m) {
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem(getStorageKey(m.key))) || {}; } catch(e) {}
  return {
    ventas: saved.ventas || new Array(m.dates.length).fill(0),
    dias: saved.dias || m.dates.length,
    meta: saved.meta || m.meta
  };
}
function saveData(m, state) {
  localStorage.setItem(getStorageKey(m.key), JSON.stringify(state));
}

  currentMode = mode;
  localStorage.setItem('modo_2026', mode);
  document.getElementById('section-pt').classList.toggle('active', mode === 'pt');
  document.getElementById('section-ft').classList.toggle('active', mode === 'ft');
  document.getElementById('btn-pt').classList.toggle('active', mode === 'pt');
  document.getElementById('btn-ft').classList.toggle('active', mode === 'ft');
}

let currentView = 'home';
function setView(view) {
  currentView = view;
  ['home','progress','rewards','menu'].forEach(v => {
    document.getElementById('navbtn-' + v).classList.toggle('active', v === view);
  });
  document.querySelectorAll('.view-page').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });
}

function showCelebration(text, success) {
  const overlay = document.getElementById('celebration-overlay');
  const box = document.getElementById('celebration-box');
  box.textContent = text;
  box.className = 'celebration-box' + (success ? '' : ' sad');
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 2500);
}

const charts = {};
const calendarState = {};

function buildPanel(m, tabsEl, panelsEl, isFT) {
  const btn = document.createElement('button');
  btn.className = 'tab-btn';
  btn.textContent = m.label;
  btn.dataset.key = m.key;
  btn.addEventListener('click', () => switchTab(m.key, tabsEl, panelsEl));
  tabsEl.appendChild(btn);

  const panel = document.createElement('div');
  panel.className = 'month-panel';
  panel.id = 'panel-' + m.key;

  const diasLabel = isFT ? 'Días trabajados' : 'Días que trabajo';

  const homeHtml = `
    <div class="greeting-block">
      <h1><span class="greeting-name-slot"></span> 👋</h1>
    </div>
    <div class="stat-grid">
      <div class="stat-card">
        <p class="stat-label">Falta</p>
        <p class="stat-value" id="falta-${m.key}">$0</p>
        <p class="stat-sub-label">Meta del período</p>
        <input type="number" id="meta-${m.key}" value="${m.meta}" min="0" style="width:100%;border:none;background:transparent;font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;color:#C9510C;padding:0;">
      </div>
      <div class="stat-card">
        <p class="stat-label">Necesitas hacer/día</p>
        <p class="stat-value" id="promedio-${m.key}">$0</p>
        <p class="stat-sub-label">${diasLabel}</p>
        <p class="stat-sub-value"><input type="number" id="dias-${m.key}" value="${m.dates.length}" min="1" style="width:50px;border:none;background:transparent;font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;color:#C9510C;"></p>
      </div>
    </div>
    <div class="card today-card">
      <div class="today-date" id="today-date-${m.key}"></div>
      <p class="today-question">¿Cuánto vendiste hoy?</p>
      <div id="today-area-${m.key}"></div>
    </div>
    <div class="card" style="padding:18px 20px 20px;">
      <p class="progress-card-title">Progreso hacia la meta</p>
      <div class="progress-bg"><div class="progress-fill" id="progress-${m.key}"><span id="pct-${m.key}">0%</span></div></div>
    </div>
    <div class="calendar-card">
      <div class="calendar-header">
        <span class="calendar-title">${m.label} 2026</span>
        <div class="calendar-nav">
          <button class="calendar-nav-btn" id="cal-prev-${m.key}">‹</button>
          <button class="calendar-nav-btn" id="cal-next-${m.key}">›</button>
        </div>
      </div>
      <div class="calendar-week" id="cal-week-${m.key}"></div>
    </div>
    <button class="reset-btn" data-key="${m.key}">Reiniciar período</button>
  `;

  const progressHtml = `
    <div class="card" style="padding:18px 20px 20px;">
      <p class="card-title">Progreso hacia la meta</p>
      <div class="progress-bg"><div class="progress-fill" id="progress2-${m.key}"><span id="pct2-${m.key}">0%</span></div></div>
    </div>
    <div class="chart-card">
      <p class="card-title">Ventas por día vs meta diaria</p>
      <div style="position:relative; width:100%; height:240px;">
        <canvas id="chart-${m.key}"></canvas>
      </div>
    </div>
    <div class="card">
      <p class="card-title">Resumen de avance</p>
      <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span style="font-size:14px;color:#444;">Vendido</span><span style="font-weight:700;" id="vendido-${m.key}">$0</span></div>
      <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span style="font-size:14px;color:#444;">Falta</span><span style="font-weight:700;" id="falta2-${m.key}">$0</span></div>
      <div style="display:flex; justify-content:space-between;"><span style="font-size:14px;color:#444;">Meta diaria</span><span style="font-weight:700;" id="meta-diaria-${m.key}">$0</span></div>
    </div>
  `;

  panel.innerHTML = `
    <div class="view-page active" data-view="home">${homeHtml}</div>
    <div class="view-page" data-view="progress">${progressHtml}</div>
    <div class="view-page" data-view="rewards"><div class="placeholder-card">🏆<br>Próximamente</div></div>
    <div class="view-page" data-view="menu"><div class="placeholder-card">⚙️<br>Próximamente</div></div>
  `;
  panelsEl.appendChild(panel);
}

function switchTab(key, tabsEl, panelsEl) {
  tabsEl.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  panelsEl.querySelectorAll('.month-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + key));
}

function renderCalendarWeek(m, ventas, metaDiaria) {
  const weekIdx = calendarState[m.key] || 0;
  const totalWeeks = Math.ceil(m.dates.length / 7);
  const startIdx = weekIdx * 7;
  const weekDates = m.dates.slice(startIdx, startIdx + 7);

  const now = new Date();
  const todayDM = String(now.getDate()).padStart(2,'0') + '-' + String(now.getMonth()+1).padStart(2,'0');

  const weekEl = document.getElementById(`cal-week-${m.key}`);
  weekEl.innerHTML = '';

  weekDates.forEach((d, i) => {
    const idx = startIdx + i;
    const v = ventas[idx] || 0;
    const isToday = d[0] === todayDM;
    const wrap = document.createElement('div');
    wrap.style.display = 'flex';
    wrap.style.flexDirection = 'column';
    wrap.style.alignItems = 'center';

    const label = document.createElement('div');
    label.className = 'cal-day-label';
    label.textContent = d[1].substring(0,1);
    wrap.appendChild(label);

    const dayBtn = document.createElement('button');
    dayBtn.className = 'cal-day-btn';
    if (isToday) dayBtn.classList.add('today');
    else if (v > 0 && v >= metaDiaria) dayBtn.classList.add('success');
    else if (v > 0) dayBtn.classList.add('has-sale');
    dayBtn.textContent = d[0].split('-')[0];
    dayBtn.addEventListener('click', () => openDayEdit(m, idx, d));
    wrap.appendChild(dayBtn);

    weekEl.appendChild(wrap);
  });

  for (let i = weekDates.length; i < 7; i++) {
    const filler = document.createElement('div');
    weekEl.appendChild(filler);
  }

  document.getElementById(`cal-prev-${m.key}`).disabled = weekIdx <= 0;
  document.getElementById(`cal-next-${m.key}`).disabled = weekIdx >= totalWeeks - 1;
}

let dayEditContext = null;
function openDayEdit(m, idx, d) {
  dayEditContext = { m, idx };
  const diasSemanaLarga = {'Lun':'lunes','Mar':'martes','Mié':'miércoles','Jue':'jueves','Vie':'viernes','Sáb':'sábado','Dom':'domingo'};
  document.getElementById('day-edit-title').textContent = `${diasSemanaLarga[d[1]] || d[1]} ${d[0]}`;
  const current = window['ventasCache_' + m.key] ? window['ventasCache_' + m.key][idx] : 0;
  const inp = document.getElementById('day-edit-input');
  inp.value = current > 0 ? current.toLocaleString('es-CL') : '';
  document.getElementById('day-edit-overlay').classList.add('show');
  setTimeout(() => inp.focus(), 100);
}
document.getElementById('day-edit-cancel').addEventListener('click', () => {
  document.getElementById('day-edit-overlay').classList.remove('show');
});
document.getElementById('day-edit-save').addEventListener('click', () => {
  if (!dayEditContext) return;
  const { m, idx } = dayEditContext;
  const n = parseCurrency(document.getElementById('day-edit-input').value);
  window['setVenta_' + m.key](idx, n);
  document.getElementById('day-edit-overlay').classList.remove('show');
});

function setupMonth(m, isFT) {
  const state = loadData(m);
  let ventas = state.ventas.slice();
  let dias = state.dias;
  let meta = state.meta;
  calendarState[m.key] = 0;

  window['ventasCache_' + m.key] = ventas;

  document.getElementById(`dias-${m.key}`).value = dias;
  document.getElementById(`meta-${m.key}`).value = meta;

  const now = new Date();
  const todayDM = String(now.getDate()).padStart(2,'0') + '-' + String(now.getMonth()+1).padStart(2,'0');
  const todayIdx = m.dates.findIndex(d => d[0] === todayDM);
  const diasSemana = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const dateLabel = `${diasSemana[now.getDay()]} ${now.getDate()} de ${meses[now.getMonth()]}`;
  document.getElementById(`today-date-${m.key}`).textContent = dateLabel;

  const todayArea = document.getElementById(`today-area-${m.key}`);
  if (todayIdx !== -1) {
    todayArea.innerHTML = `
      <div class="today-input-row">
        <input type="text" inputmode="numeric" class="today-input" id="today-input-${m.key}" placeholder="$0">
        <button class="today-confirm-btn" id="today-confirm-${m.key}">Guardar</button>
      </div>
    `;
  } else {
    todayArea.innerHTML = `<div class="today-no-match">Hoy no corresponde a un día de este período.</div>`;
  }

  if (todayIdx !== -1) {
    calendarState[m.key] = Math.floor(todayIdx / 7);
  }

  let monthCelebrated = ventas.length > 0 && ventas.filter(v => v > 0).length === (isFT ? dias : ventas.length);

  function update(triggeredIdx) {
    meta = parseFloat(document.getElementById(`meta-${m.key}`).value) || 1;
    dias = parseFloat(document.getElementById(`dias-${m.key}`).value) || 1;
    const metaDiaria = meta / dias;

    const total = ventas.reduce((a,b) => a+b, 0);
    const pct = Math.min(total / meta, 1);
    const trabajados = ventas.filter(v => v > 0).length;
    const diasRestantes = Math.max(dias - trabajados, 0);
    const falta = Math.max(meta - total, 0);
    const necesarioPorDia = diasRestantes > 0 ? falta / diasRestantes : (falta > 0 ? falta : 0);

    document.getElementById(`falta-${m.key}`).textContent = fmt(falta);
    document.getElementById(`promedio-${m.key}`).textContent = fmt(necesarioPorDia);
    document.getElementById(`vendido-${m.key}`).textContent = fmt(total);
    document.getElementById(`falta2-${m.key}`).textContent = fmt(falta);
    document.getElementById(`meta-diaria-${m.key}`).textContent = fmt(metaDiaria);

    const pctTxt = (pct*100).toFixed(0) + '%';
    document.getElementById(`pct-${m.key}`).textContent = pctTxt;
    document.getElementById(`progress-${m.key}`).style.width = (pct*100) + '%';
    document.getElementById(`pct2-${m.key}`).textContent = pctTxt;
    document.getElementById(`progress2-${m.key}`).style.width = (pct*100) + '%';

    renderCalendarWeek(m, ventas, metaDiaria);

    if (triggeredIdx !== undefined) {
      const v = ventas[triggeredIdx];
      if (v > 0) {
        const ratio = v / metaDiaria;
        if (ratio >= 1) showCelebration('vamooos! 🔥', true);
        else if (ratio >= 0.5) showCelebration('Uff casi', false);
        else showCelebration('Pa´la otra 😔', false);
      }

      const completado = isFT ? (trabajados >= dias) : ventas.every(v => v > 0);
      if (completado && !monthCelebrated) {
        monthCelebrated = true;
        setTimeout(() => {
          showCelebration(pct >= 1 ? 'felicidades hoy se come 🤑' : 'hoy no se come 😔', pct >= 1);
        }, 2700);
      } else if (!completado) {
        monthCelebrated = false;
      }
    }

    const metaDiariaArr = new Array(m.dates.length).fill(metaDiaria);
    if (charts[m.key]) {
      charts[m.key].data.datasets[0].data = ventas;
      charts[m.key].data.datasets[1].data = metaDiariaArr;
      charts[m.key].update();
    } else {
      const ctxEl = document.getElementById(`chart-${m.key}`);
      if (ctxEl) {
        charts[m.key] = new Chart(ctxEl, {
          type: 'bar',
          data: {
            labels: m.dates.map(d => d[0]),
            datasets: [
              { label: 'Venta del día', data: ventas, backgroundColor: '#E8590C' },
              { label: 'Meta diaria', data: metaDiariaArr, backgroundColor: '#FBD9C0' }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: true, position: 'bottom', labels: { boxWidth: 12, font: { size: 11, family: 'Poppins' } } } },
            scales: { y: { ticks: { callback: v => '$' + (v/1000) + 'k' } } }
          }
        });
      }
    }
    saveData(m, { ventas, dias, meta });
  }

  window['setVenta_' + m.key] = (idx, value) => {
    ventas[idx] = value;
    window['ventasCache_' + m.key] = ventas;
    if (idx === todayIdx) {
      const inp = document.getElementById(`today-input-${m.key}`);
      if (inp) inp.value = value > 0 ? value.toLocaleString('es-CL') : '';
    }
    update(idx);
  };

  if (todayIdx !== -1) {
    const todayInput = document.getElementById(`today-input-${m.key}`);
    const todayBtn = document.getElementById(`today-confirm-${m.key}`);
    const existing = ventas[todayIdx] || 0;
    if (existing > 0) todayInput.value = existing.toLocaleString('es-CL');
    const saveToday = () => {
      const n = parseCurrency(todayInput.value);
      window['setVenta_' + m.key](todayIdx, n);
      todayInput.value = n > 0 ? n.toLocaleString('es-CL') : '';
    };
    todayBtn.addEventListener('click', saveToday);
    todayInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveToday(); });
  }

  document.getElementById(`dias-${m.key}`).addEventListener('input', () => update());
  document.getElementById(`meta-${m.key}`).addEventListener('input', () => update());

  document.getElementById(`cal-prev-${m.key}`).addEventListener('click', () => {
    calendarState[m.key] = Math.max(0, (calendarState[m.key] || 0) - 1);
    renderCalendarWeek(m, ventas, meta/dias);
  });
  document.getElementById(`cal-next-${m.key}`).addEventListener('click', () => {
    const totalWeeks = Math.ceil(m.dates.length / 7);
    calendarState[m.key] = Math.min(totalWeeks - 1, (calendarState[m.key] || 0) + 1);
    renderCalendarWeek(m, ventas, meta/dias);
  });

  document.querySelector(`.reset-btn[data-key="${m.key}"]`).addEventListener('click', () => {
    if (confirm(`¿Reiniciar todos los datos de ${m.label}?`)) {
      ventas = new Array(m.dates.length).fill(0);
      window['ventasCache_' + m.key] = ventas;
      update();
    }
  });

  update();
}

initWelcome();
setMode(currentMode);
setView('home');

const tabsPT = document.getElementById('tabs-pt');
const panelsPT = document.getElementById('panels-pt');
MONTHS_PT.forEach(m => buildPanel(m, tabsPT, panelsPT, false));
if (MONTHS_PT.length) switchTab(MONTHS_PT[0].key, tabsPT, panelsPT);
MONTHS_PT.forEach(m => setupMonth(m, false));

const tabsFT = document.getElementById('tabs-ft');
const panelsFT = document.getElementById('panels-ft');
MONTHS_FT.forEach(m => buildPanel(m, tabsFT, panelsFT, true));
if (MONTHS_FT.length) switchTab(MONTHS_FT[0].key, tabsFT, panelsFT);
MONTHS_FT.forEach(m => setupMonth(m, true));

refreshAllGreetings();
</script>
